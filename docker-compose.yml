services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-qrcard}
      POSTGRES_USER:     ${POSTGRES_USER:-qrcard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qrcard} -d ${POSTGRES_DB:-qrcard}"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    # Только localhost — наружу проксирует host-nginx (TLS терминируется там).
    ports:
      - "127.0.0.1:8000:8000"

volumes:
  pgdata:
