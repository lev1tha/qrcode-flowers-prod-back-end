# QR Card — отдельный server-блок. Второй проект на VPS НЕ затрагивается
# (у него свой server_name). Размести как /etc/nginx/sites-available/qrcard.conf,
# слинкуй в sites-enabled, затем: nginx -t && systemctl reload nginx.
#
# Замени example.com на свой домен (обе A-записи @ и www ведут на сервер) и
# /srv/qrcard/backend — на путь backend-репозитория (совпадает с bind-mount из compose).

# WebSocket upgrade для HMR Vite (map — в http-контексте, до server{}).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# www → корень (канонический хост). certbot добавит сюда TLS и 80→443.
server {
    listen 80;
    listen [::]:80;
    server_name www.example.com;
    return 301 $scheme://example.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # До 50 МБ видео (+ запас) на загрузку.
    client_max_body_size 60M;

    # ── API + Django admin → backend-контейнер (127.0.0.1:8000) ──
    location ~ ^/(api|django-admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Статика Django (collectstatic → volume) ──
    location /static/ {
        alias /srv/qrcard/backend/staticfiles/;
        access_log off;
        expires 30d;
    }

    # ── Медиа (видео) — nginx нативно отдаёт с Range для iOS ──
    location /media/ {
        alias /srv/qrcard/backend/media/;
        access_log off;
        expires 7d;
    }

    # ── Всё остальное → Vite dev-сервер (127.0.0.1:5173) + HMR ──
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# TLS на оба хоста:  sudo certbot --nginx -d example.com -d www.example.com
# certbot создаст 443-блоки и редиректы 80→443 (www продолжит вести на корень).
